# Mosquitto MQTT Broker Configuration for Development

# Listener port for WebSocket connections
listener 8080

# Allow WebSocket connections
protocol websockets

# Enable anonymous authentication for development
allow_anonymous true

# Set persistence
persistence true
persistence_location ./data/

# Log settings
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
connection_messages true
log_timestamp true